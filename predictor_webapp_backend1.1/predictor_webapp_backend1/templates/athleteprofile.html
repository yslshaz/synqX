<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Profile</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='athleteprofile.css') }}">
</head>

<body>
<div class="app-container">
  <nav class="nav-bar">
    <div class="logo" id="app-title">SYNQ</div>
    <div class="nav-links">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/onboarding">Features</a>
      <a class="nav-link" href="/dashboard">Dashboard</a>
      <a class="nav-link active" href="/athletes">Athletes</a>
    </div>
  </nav>

  <div id="page-content">
    <!-- Athlete Profile Page -->
    <main id="athlete-profile" class="page active">

      <!-- Profile Header -->
      <div style="padding:0 0 24px 0;">
        <a href="#" onclick="event.preventDefault(); window.location.href = sessionStorage.getItem('athleteListUrl') || '/athletes';" style="display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.45);font-size:13px;font-family:'Inter',sans-serif;text-decoration:none;margin-bottom:20px;transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.45)'">← Back to Athletes</a>
        <h1 id="profile-athlete-name" style="font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:#FFFFFF;letter-spacing:2px;text-transform:uppercase;margin:0 0 10px 0;">Loading...</h1>
        <div style="display:flex;align-items:center;gap:28px;flex-wrap:wrap;">
          <p id="profile-athlete-status" style="font-family:'Inter',sans-serif;font-size:14px;color:rgba(255,255,255,0.55);margin:0;">—</p>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-family:'Inter',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;">Energy</span>
            <span id="energy-label" style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#00FF88;">—</span>
          </div>
        </div>
      </div>

      <!-- JARVIS Orbital Interface -->
      <div class="jarvis-container">
        <div class="orbital-system">

          <!-- Particle layer -->
          <div class="particle-container" id="particle-container"></div>

          <!-- ─── Central Reactor ─── -->
          <div class="central-reactor" id="central-reactor" style="color:#00FF88;">
            <div class="reactor-aura" id="reactor-aura"></div>
            <div class="warning-orbit" id="warning-orbit"></div>
            <svg class="reactor-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="coreGradient" cx="38%" cy="32%" r="65%">
                  <stop offset="0%"   stop-color="white"        stop-opacity="0.95"/>
                  <stop offset="22%"  stop-color="currentColor" stop-opacity="0.9"/>
                  <stop offset="60%"  stop-color="currentColor" stop-opacity="0.5"/>
                  <stop offset="100%" stop-color="currentColor" stop-opacity="0.05"/>
                </radialGradient>
              </defs>

              <!-- Outer energy track -->
              <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
              <!-- Energy ring — spins via CSS, fill set by JS -->
              <circle id="energy-ring" cx="120" cy="120" r="110" fill="none" stroke="currentColor" stroke-width="7" stroke-dasharray="0 691" stroke-linecap="round"/>

              <!-- Atmospheric glow halos -->
              <circle cx="120" cy="120" r="103" fill="currentColor" opacity="0.05"/>
              <circle cx="120" cy="120" r="91" fill="currentColor" opacity="0.08"/>
              <!-- Outer structural ring -->
              <circle cx="120" cy="120" r="100" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.15"/>

              <!-- Core glowing sphere -->
              <circle cx="120" cy="120" r="95" fill="url(#coreGradient)" stroke="currentColor" stroke-width="1.5" opacity="0.95"/>
              <!-- Inner detail ring -->
              <circle cx="120" cy="120" r="72" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.28"/>

              <!-- Energy percentage -->
              <text id="sphere-pct" x="120" y="118" text-anchor="middle" fill="white"
                    font-family="Orbitron,sans-serif" font-size="46" font-weight="900">—</text>
              <text x="120" y="138" text-anchor="middle" fill="rgba(255,255,255,0.55)"
                    font-family="Inter,sans-serif" font-size="9" letter-spacing="2.5" font-weight="600">ENERGY</text>
              <!-- Fatigue status -->
              <text id="sphere-status" x="120" y="155" text-anchor="middle" fill="currentColor"
                    font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">—</text>
            </svg>
          </div>

          <!-- ─── Heart Rate Orbital (Top) — Electric Purple ─── -->
          <div class="orbital-data-ring orbital-top" id="orbital-hr" style="color:#A855F7;">
            <svg class="orbital-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
              <circle cx="80" cy="80" r="70" fill="rgba(168,85,247,0.05)" stroke="rgba(168,85,247,0.15)" stroke-width="8"/>
              <circle id="hr-ring" cx="80" cy="80" r="70" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 80 80)"/>
              <text x="80" y="70"  text-anchor="middle" fill="currentColor"          font-family="Orbitron,sans-serif" font-size="24" font-weight="900" id="profile-heart-rate">—</text>
              <text x="80" y="88"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif"    font-size="10">BPM</text>
              <text x="80" y="104" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif"    font-size="8"  letter-spacing="1">HEART RATE</text>
            </svg>
            <div class="sparkline-container" id="sparkline-heart-rate" style="color:#A855F7;top:-10px;left:170px;">
              <div class="sparkline-title">Heart Rate Trend</div>
              <canvas class="sparkline-canvas" id="sparkline-hr-canvas"></canvas>
            </div>
            <div class="comparison-panel" id="comparison-panel-heart-rate" style="color:#A855F7;top:-10px;left:170px;">
              <div class="comparison-header">
                <span class="comparison-title">Heart Rate</span>
                <button class="comparison-close" onclick="closeComparison('heart-rate')">×</button>
              </div>
              <div class="comparison-stat">
                <div class="comparison-values">
                  <div class="comparison-value">
                    <span class="comparison-value-label">Baseline</span>
                    <span class="comparison-value-number" id="baseline-heart-rate">—</span>
                  </div>
                  <div class="comparison-value" style="text-align:right;">
                    <span class="comparison-value-label">Current</span>
                    <span class="comparison-value-number" id="current-heart-rate">—</span>
                  </div>
                </div>
              </div>
              <div class="comparison-change" id="heart-rate-change"></div>
            </div>
          </div>

          <!-- ─── Temperature Orbital (Right) — Neon Pink ─── -->
          <div class="orbital-data-ring orbital-right" id="orbital-temp" style="color:#EC4899;">
            <svg class="orbital-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
              <circle cx="80" cy="80" r="70" fill="rgba(236,72,153,0.05)" stroke="rgba(236,72,153,0.15)" stroke-width="8"/>
              <circle id="temp-ring" cx="80" cy="80" r="70" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 80 80)"/>
              <text x="80" y="70"  text-anchor="middle" fill="currentColor"          font-family="Orbitron,sans-serif" font-size="20" font-weight="900" id="profile-temperature">—</text>
              <text x="80" y="88"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif"    font-size="10">°C</text>
              <text x="80" y="104" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif"    font-size="8"  letter-spacing="1">TEMPERATURE</text>
            </svg>
            <div class="sparkline-container" id="sparkline-temperature" style="color:#EC4899;top:170px;left:-60px;">
              <div class="sparkline-title">Temperature Trend</div>
              <canvas class="sparkline-canvas" id="sparkline-temp-canvas"></canvas>
            </div>
            <div class="comparison-panel" id="comparison-panel-temperature" style="color:#EC4899;top:170px;left:-60px;">
              <div class="comparison-header">
                <span class="comparison-title">Temperature</span>
                <button class="comparison-close" onclick="closeComparison('temperature')">×</button>
              </div>
              <div class="comparison-stat">
                <div class="comparison-values">
                  <div class="comparison-value">
                    <span class="comparison-value-label">Baseline</span>
                    <span class="comparison-value-number" id="baseline-temperature">—</span>
                  </div>
                  <div class="comparison-value" style="text-align:right;">
                    <span class="comparison-value-label">Current</span>
                    <span class="comparison-value-number" id="current-temperature">—</span>
                  </div>
                </div>
              </div>
              <div class="comparison-change" id="temperature-change"></div>
            </div>
          </div>

          <!-- ─── Blood Oxygen Orbital (Left) — Electric Blue ─── -->
          <div class="orbital-data-ring orbital-left" id="orbital-o2" style="color:#3B82F6;">
            <svg class="orbital-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
              <circle cx="80" cy="80" r="70" fill="rgba(59,130,246,0.05)" stroke="rgba(59,130,246,0.15)" stroke-width="8"/>
              <circle id="o2-ring" cx="80" cy="80" r="70" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 80 80)"/>
              <text x="80" y="70"  text-anchor="middle" fill="currentColor"          font-family="Orbitron,sans-serif" font-size="24" font-weight="900" id="profile-blood-oxygen">—</text>
              <text x="80" y="88"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif"    font-size="10">%</text>
              <text x="80" y="104" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif"    font-size="8"  letter-spacing="1">BLOOD O₂</text>
            </svg>
            <div class="sparkline-container" id="sparkline-blood-oxygen" style="color:#3B82F6;top:170px;left:-60px;">
              <div class="sparkline-title">SpO₂ Trend</div>
              <canvas class="sparkline-canvas" id="sparkline-o2-canvas"></canvas>
            </div>
            <div class="comparison-panel" id="comparison-panel-blood-oxygen" style="color:#3B82F6;top:170px;left:-60px;">
              <div class="comparison-header">
                <span class="comparison-title">Blood O₂</span>
                <button class="comparison-close" onclick="closeComparison('blood-oxygen')">×</button>
              </div>
              <div class="comparison-stat">
                <div class="comparison-values">
                  <div class="comparison-value">
                    <span class="comparison-value-label">Baseline</span>
                    <span class="comparison-value-number" id="baseline-blood-oxygen">—</span>
                  </div>
                  <div class="comparison-value" style="text-align:right;">
                    <span class="comparison-value-label">Current</span>
                    <span class="comparison-value-number" id="current-blood-oxygen">—</span>
                  </div>
                </div>
              </div>
              <div class="comparison-change" id="blood-oxygen-change"></div>
            </div>
          </div>

        </div><!-- /.orbital-system -->
      </div><!-- /.jarvis-container -->

    </main>
  </div>

</div>

<script>
  // Expose Jinja2 template variable to JS
  window.athleteIdParam = "{{ athlete_id or '' }}";
</script>
<script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
<script src="{{ url_for('static', filename='shared.js') }}"></script>
<script src="{{ url_for('static', filename='athleteprofile.js') }}"></script>

</body>
</html>
