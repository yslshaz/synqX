<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='welcome.css') }}">
</head>

<body>

  <!-- Welcome Page -->

  <div class="app-container">
    <nav class="nav-bar">
      <div class="logo" id="app-title">SYNQ</div>
      <div class="nav-links">
        <a class="nav-link active" href="/">Home</a>
        <a class="nav-link" href="/onboarding">Features</a>
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/athletes">Athletes</a>
      </div>
    </nav>
    <div id="page-content">

      <!-- Welcome Page -->
      <main id="welcome" class="page active">
        <div class="welcome-screen">
          <h1 class="welcome-title" id="welcome-title" style="font-family: 'Orbitron', sans-serif; font-size: 110px; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 24px #10ff80, 0 0 48px #10ff80, 0 0 8px #10B981, 0 0 2px #10B981; border-radius: 18px; padding: 0 24px;">SYNQ</h1>
          <p class="welcome-subtitle" id="welcome-subtitle">Athletic Intelligence Platform</p>
          <div class="vitals-preview">
            <div class="vital-card"><span class="vital-icon">❤️</span>
              <div class="vital-label">
                Heart Rate
              </div>
              <div class="vital-sublabel">
                Real-time monitoring
              </div>
            </div>
            <div class="vital-card"><span class="vital-icon">🌡️</span>
              <div class="vital-label">
                Temperature
              </div>
              <div class="vital-sublabel">
                Body heat tracking
              </div>
            </div>
            <div class="vital-card"><span class="vital-icon">💨</span>
              <div class="vital-label">
                Blood Oxygen
              </div>
              <div class="vital-sublabel">
                SpO₂ saturation %
              </div>
            </div>
          </div>
          <a class="primary-button" id="get-started-button" href="/dashboard" style="display:inline-block;text-decoration:none;">Get Started</a>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
  <script src="{{ url_for('static', filename='shared.js') }}"></script>
  <script src="{{ url_for('static', filename='welcome.js') }}"></script>

</body>

</html>
