<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athletes List</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='athletes.css') }}">
</head>

<body>
<div class="app-container">
  <nav class="nav-bar">
    <div class="logo" id="app-title">SYNQ</div>
    <div class="nav-links">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/onboarding">Features</a>
      <a class="nav-link" href="/dashboard">Dashboard</a>
      <a class="nav-link active" href="/athletes">Athletes</a>
    </div>
  </nav>

  <!-- Athletes List Page -->
  <main id="athletes" class="page">
    <div id="page-content">
      <div class="athlete-list-header">
        <div>
          <h1 class="page-title">Athletes</h1>
          <p class="page-subtitle">Real-time fatigue monitoring</p>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div id="filter-indicator-container"></div>
          <button class="add-athlete-button">+ Add Athlete</button>
        </div>
      </div>
      <div id="athlete-list-container">
        <div class="loading-indicator">Loading athletes...</div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Athlete Modal -->
<div class="modal-overlay" id="athlete-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add Athlete</h2>
      <button class="close-button" onclick="closeAthleteModal()">×</button>
    </div>
    <form id="athlete-form" onsubmit="handleAthleteSubmit(event)">
      <div class="form-group">
        <label class="form-label" for="athlete-name">Athlete Name</label>
        <input type="text" id="athlete-name" class="form-input" required placeholder="Enter athlete name">
      </div>
      <div class="form-group">
        <label class="form-label" for="heart-rate">Heart Rate: <span id="heart-rate-value">120</span> bpm</label>
        <input type="range" id="heart-rate" class="form-slider" required min="60" max="180" value="120" step="1">
        <div class="slider-labels"><span>60</span><span>180</span></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="body-temp">Body Temperature: <span id="body-temp-value">37.0</span> °C</label>
        <input type="range" id="body-temp" class="form-slider" required min="35.0" max="39.0" value="37.0" step="0.1">
        <div class="slider-labels"><span>35.0</span><span>39.0</span></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="blood-oxygen">Blood Oxygen: <span id="blood-oxygen-value">95</span> %</label>
        <input type="range" id="blood-oxygen" class="form-slider" required min="90" max="100" value="95" step="1">
        <div class="slider-labels"><span>90</span><span>100</span></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="notes">Notes (Optional)</label>
        <input type="text" id="notes" class="form-input" placeholder="Any observations or comments">
      </div>
      <div class="form-buttons">
        <button type="button" class="secondary-button" onclick="closeAthleteModal()">Cancel</button>
        <button type="submit" class="primary-button" id="submit-button">Add Athlete</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
<script src="{{ url_for('static', filename='shared.js') }}"></script>
<script src="{{ url_for('static', filename='athletes.js') }}"></script>

</body>
</html>
