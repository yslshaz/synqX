<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

  <!-- Dashboard Page -->
  <div class="app-container">
    <nav class="nav-bar">
      <div class="logo" id="app-title">SYNQ</div>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/onboarding">Features</a>
        <a class="nav-link active" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/athletes">Athletes</a>
      </div>
    </nav>
    <main class="page" style="padding: 32px;">
      <h1 style="font-family: 'Inter', sans-serif; font-size: 40px; font-weight: 800; text-align: center; margin: 0 0 40px 0; letter-spacing: -2px; color: #FFFFFF;">Team Dashboard</h1>
      <div class="dashboard-section">
        <div class="section-header">
          <div class="section-header-left">
            <h2 class="section-title">Team Overview</h2>
          </div>
          <div class="active-athletes-badge">
            <span class="active-athletes-text">Active athletes: <strong id="total-athletes">0</strong></span>
          </div>
        </div>
        <div class="status-cards-grid">
          <div class="status-card status-optimal" data-status="optimal" onclick="filterAthletesByStatus('Not Fatigued')">
            <div class="status-card-inner">
              <div class="status-3d-icon">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="greenGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="greenGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" style="stop-color:#6EE7B7;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
                    </linearGradient>
                    <filter id="greenGlow">
                      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                      <feMerge>
                        <feMergeNode in="coloredBlur" />
                        <feMergeNode in="SourceGraphic" />
                      </feMerge>
                    </filter>
                  </defs>
                  <ellipse cx="100" cy="160" rx="60" ry="15" fill="rgba(16, 185, 129, 0.2)" />
                  <circle cx="100" cy="90" r="70" fill="url(#greenGrad1)" filter="url(#greenGlow)" />
                  <ellipse cx="100" cy="70" rx="50" ry="25" fill="url(#greenGrad2)" opacity="0.6" />
                  <circle cx="75" cy="65" r="8" fill="rgba(255, 255, 255, 0.9)" />
                  <circle cx="78" cy="68" r="3" fill="rgba(255, 255, 255, 0.6)" />
                  <path d="M 70 95 L 85 110 L 115 75" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
                </svg>
              </div>
              <div class="status-label">Not Fatigued</div>
              <div class="status-count" id="normal-count">0</div>
            </div>
          </div>
          <div class="status-card status-moderate" data-status="moderate" onclick="filterAthletesByStatus('Moderate')">
            <div class="status-card-inner">
              <div class="status-3d-icon">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="yellowGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="yellowGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
                    </linearGradient>
                    <filter id="yellowGlow">
                      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                      <feMerge>
                        <feMergeNode in="coloredBlur" />
                        <feMergeNode in="SourceGraphic" />
                      </feMerge>
                    </filter>
                  </defs>
                  <ellipse cx="100" cy="160" rx="60" ry="15" fill="rgba(245, 158, 11, 0.2)" />
                  <circle cx="100" cy="90" r="70" fill="url(#yellowGrad1)" filter="url(#yellowGlow)" />
                  <ellipse cx="100" cy="70" rx="50" ry="25" fill="url(#yellowGrad2)" opacity="0.6" />
                  <circle cx="75" cy="65" r="8" fill="rgba(255, 255, 255, 0.9)" />
                  <circle cx="78" cy="68" r="3" fill="rgba(255, 255, 255, 0.6)" />
                  <rect x="92" y="95" width="16" height="8" rx="4" fill="#FFFFFF" opacity="0.9" />
                </svg>
              </div>
              <div class="status-label">Moderate</div>
              <div class="status-count" id="elevated-count">0</div>
            </div>
          </div>
          <div class="status-card status-fatigued" data-status="fatigued" onclick="filterAthletesByStatus('Fatigued')">
            <div class="status-card-inner">
              <div class="status-3d-icon">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="redGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" style="stop-color:#F87171;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="redGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
                    </linearGradient>
                    <filter id="redGlow">
                      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                      <feMerge>
                        <feMergeNode in="coloredBlur" />
                        <feMergeNode in="SourceGraphic" />
                      </feMerge>
                    </filter>
                  </defs>
                  <ellipse cx="100" cy="160" rx="60" ry="15" fill="rgba(239, 68, 68, 0.2)" />
                  <circle cx="100" cy="90" r="70" fill="url(#redGrad1)" filter="url(#redGlow)" />
                  <ellipse cx="100" cy="70" rx="50" ry="25" fill="url(#redGrad2)" opacity="0.6" />
                  <circle cx="75" cy="65" r="8" fill="rgba(255, 255, 255, 0.9)" />
                  <circle cx="78" cy="68" r="3" fill="rgba(255, 255, 255, 0.6)" />
                  <path d="M 75 85 L 105 115 M 105 85 L 75 115" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />
                </svg>
              </div>
              <div class="status-label">Fatigued</div>
              <div class="status-count" id="fatigued-count">0</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
  <script src="{{ url_for('static', filename='shared.js') }}"></script>
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>

</body>
</html>
