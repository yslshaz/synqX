<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <!-- Google Fonts -->
 <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
  </style>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">

  

 <style>
 /* JARVIS ORBITAL INTERFACE */
    .jarvis-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 40px 20px 40px;
      margin-bottom: 20px;
      position: relative;
      min-height: 550px;
      background: #000000;
    }

    /* Comparison Panel */
    .comparison-panel {
      position: absolute;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid currentColor;
      border-radius: 20px;
      padding: 24px;
      width: 280px;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 0 40px currentColor,
                  0 20px 60px rgba(0, 0, 0, 0.8);
      z-index: 20;
    }

    .comparison-panel.active {
      opacity: 1;
      pointer-events: all;
    }

    .comparison-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 12px;
    }

    .comparison-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .comparison-close {
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .comparison-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
    }

    .comparison-stat {
      margin-bottom: 16px;
    }

    .comparison-stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .comparison-values {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .comparison-value {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comparison-value-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .comparison-value-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1;
    }

    .comparison-change {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .comparison-change.positive {
      background: rgba(16, 185, 129, 0.15);
      color: #10B981;
    }

    .comparison-change.negative {
      background: rgba(239, 68, 68, 0.15);
      color: #EF4444;
    }

    .comparison-change.neutral {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.6);
    }

    .comparison-arrow {
      font-size: 14px;
    }

    .connecting-line {
      position: absolute;
      stroke: currentColor;
      stroke-width: 2;
      stroke-dasharray: 5, 5;
      opacity: 0.5;
      pointer-events: none;
      z-index: 15;
    }

    /* Particle System */
    .particle-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 16px currentColor, 0 0 24px currentColor;
      pointer-events: none;
      opacity: 0;
    }
    
    .particle.large {
      width: 12px;
      height: 12px;
      box-shadow: 0 0 20px currentColor, 0 0 32px currentColor;
    }

    @keyframes particle-flow-in {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0);
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.3);
      }
    }

    @keyframes particle-float {
      0%, 100% {
        transform: translate(0, 0);
      }
      25% {
        transform: translate(10px, -10px);
      }
      50% {
        transform: translate(-5px, -20px);
      }
      75% {
        transform: translate(-10px, -10px);
      }
    }

    /* Warning Indicators */
    .warning-orbit {
      position: absolute;
      width: 260px;
      height: 260px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 11;
    }

    .warning-icon {
      position: absolute;
      font-size: 24px;
      filter: drop-shadow(0 0 8px currentColor);
      animation: warning-orbit 6s linear infinite;
    }

    @keyframes warning-orbit {
      0% {
        transform: rotate(0deg) translateX(130px) rotate(0deg);
      }
      100% {
        transform: rotate(360deg) translateX(130px) rotate(-360deg);
      }
    }

    .warning-icon.warning-1 {
      animation-delay: 0s;
    }

    .warning-icon.warning-2 {
      animation-delay: -2s;
    }

    .warning-icon.warning-3 {
      animation-delay: -4s;
    }

    /* Reactor Aura */
    .reactor-aura {
      position: absolute;
      inset: -70px;
      border-radius: 50%;
      background: radial-gradient(circle, currentColor 0%, transparent 60%);
      opacity: 0.22;
      pointer-events: none;
      animation: aura-pulse 2s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes aura-pulse {
      0%, 100% {
        opacity: 0.15;
        transform: scale(1);
      }
      50% {
        opacity: 0.25;
        transform: scale(1.05);
      }
    }

    .reactor-aura.intense {
      animation: aura-pulse-intense 1s ease-in-out infinite;
    }

    @keyframes aura-pulse-intense {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.1);
      }
    }

    /* Shake animation for threshold crossing */
    @keyframes threshold-shake {
      0%, 100% { transform: translate(-50%, -50%) translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-50%, -50%) translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translate(-50%, -50%) translateX(5px); }
    }

    .shake-animation {
      animation: threshold-shake 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Faster pulse when fatigued */
    @keyframes pulse-fast {
      0%, 100% { 
        transform: translate(-50%, -50%) translateY(0px);
      }
      50% { 
        transform: translate(-50%, -50%) translateY(-12px);
      }
    }

    .reactor-fatigued {
      animation: pulse-fast 1.5s ease-in-out infinite !important;
    }

    /* Heat trail */
    .heat-trail {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, currentColor, transparent);
      pointer-events: none;
      opacity: 0;
      z-index: 9;
    }

    @keyframes trail-fade {
      0% {
        opacity: 0.8;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(2);
      }
    }

    /* Sparkline chart */
    .sparkline-container {
      position: absolute;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border: 2px solid currentColor;
      border-radius: 12px;
      padding: 16px;
      width: 200px;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: 0 0 30px currentColor, 0 10px 40px rgba(0, 0, 0, 0.8);
      z-index: 30;
    }

    .sparkline-container.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .sparkline-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .sparkline-canvas {
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 6px;
    }

    /* Burst animation for 100% energy */
    @keyframes energy-burst {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    .energy-burst-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 240px;
      height: 240px;
      border: 3px solid currentColor;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 20;
    }

    .energy-burst-ring.animate {
      animation: energy-burst 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .celebration-particle {
      position: absolute;
      font-size: 24px;
      pointer-events: none;
      opacity: 0;
      z-index: 25;
    }

    @keyframes celebration-burst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0) rotate(0deg);
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg);
      }
    }

    .orbital-system {
      position: relative;
      width: 680px;
      height: 680px;
    }

    /* Central Reactor Core */
    .central-reactor {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 240px;
      height: 240px;
      z-index: 10;
      cursor: pointer;
      animation: float-reactor 4.5s ease-in-out infinite;
    }

    @keyframes float-reactor {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px)   scale(1); }
      40%       { transform: translate(-50%, -50%) translateY(-22px) scale(1.01); }
      60%       { transform: translate(-50%, -50%) translateY(-20px) scale(1.01); }
    }

    /* Vibranium click effect */
    @keyframes vibranium-vibrate {
      0%   { transform: translate(-50%,-50%) scale(1)    rotate(0deg);    filter: brightness(1); }
      7%   { transform: translate(-54%,-50%) scale(1.07) rotate(2deg);    filter: brightness(1.8); }
      14%  { transform: translate(-46%,-50%) scale(0.95) rotate(-2deg);   filter: brightness(2.2); }
      21%  { transform: translate(-54%,-50%) scale(1.05) rotate(1.5deg);  filter: brightness(1.8); }
      28%  { transform: translate(-47%,-50%) scale(0.97) rotate(-1deg);   filter: brightness(1.5); }
      35%  { transform: translate(-52%,-50%) scale(1.03) rotate(0.5deg);  filter: brightness(1.3); }
      50%  { transform: translate(-50%,-50%) scale(1.01) rotate(0deg);    filter: brightness(1.2); }
      75%  { transform: translate(-50%,-50%) scale(1)    rotate(0deg);    filter: brightness(1.1); }
      100% { transform: translate(-50%,-50%) scale(1)    rotate(0deg);    filter: brightness(1); }
    }

    .reactor-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 18px currentColor) drop-shadow(0 0 50px currentColor) drop-shadow(0 0 90px currentColor);
    }

    /* Orbital Data Rings - Positioned around sphere */
    .orbital-data-ring {
      position: absolute;
      width: 160px;
      height: 160px;
      animation: float-orbital 4.5s ease-in-out infinite;
    }

    @keyframes float-orbital {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
      50%       { transform: translate(-50%, -50%) translateY(-6px); }
    }

    /* Top Position (Heart Rate) */
    .orbital-top {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin-top: -240px;
      color: #A855F7;
    }

    /* Right Position (Temperature) */
    .orbital-right {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin-left: 240px;
      color: #EC4899;
      animation-delay: 1.5s;
    }

    /* Left Position (Blood Oxygen) */
    .orbital-left {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin-left: -240px;
      color: #3B82F6;
      animation-delay: 3s;
    }

    /* Energy ring spin — speed controlled by --ring-speed set from JS */
    #energy-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: energy-ring-spin var(--ring-speed, 6s) linear infinite;
    }

    @keyframes energy-ring-spin {
      from { transform: rotate(-90deg); }
      to   { transform: rotate(270deg); }
    }

    .orbital-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 10px currentColor) drop-shadow(0 0 28px currentColor);
    }

    /* Haptic Feedback Pulse Effects */
    @keyframes haptic-pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 currentColor;
      }
      30% {
        transform: scale(0.92);
      }
      60% {
        transform: scale(1.08);
      }
      80% {
        transform: scale(0.98);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 20px transparent;
      }
    }

    @keyframes haptic-ripple {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    @keyframes haptic-glow-burst {
      0% {
        filter: drop-shadow(0 0 5px currentColor);
      }
      50% {
        filter: drop-shadow(0 0 25px currentColor) brightness(1.3);
      }
      100% {
        filter: drop-shadow(0 0 5px currentColor);
      }
    }

    .haptic-active {
      animation: haptic-pulse 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .haptic-ripple-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: inherit;
    }

    .haptic-ripple {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, currentColor 0%, transparent 70%);
      opacity: 0.6;
      animation: haptic-ripple 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    .haptic-glow {
      animation: haptic-glow-burst 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Enhanced button interactions */
    .primary-button:active,
    .secondary-button:active,
    .add-athlete-button:active {
      animation: haptic-pulse 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (max-width: 768px) {
      .welcome-title {
        font-size: 56px;
      }
      
      .page-title {
        font-size: 36px;
      }

      .section-title {
        font-size: 18px;
      }
      
      .nav-bar {
        padding: 16px 24px;
      }
      
      .page {
        padding: 24px 16px;
      }
      
      .nav-links {
        gap: 4px;
      }
      
      .nav-link {
        padding: 6px 12px;
        font-size: 12px;
      }
      
      .vitals-preview {
        gap: 24px;
      }

      .feature-cards {
        grid-template-columns: 1fr;
      }

      .dashboard-actions {
        grid-template-columns: 1fr;
      }

      .trend-controls {
        flex-direction: column;
      }

      .trend-tab {
        width: 100%;
      }

      .status-cards-grid {
        grid-template-columns: 1fr;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .orbital-system {
        width: 100%;
        max-width: 400px;
        height: 500px;
      }

      .central-reactor {
        width: 180px;
        height: 180px;
      }

      .orbital-data-ring {
        width: 120px;
        height: 120px;
      }
    }
</style>
  </head>

<body>
<div class="app-container">
    <nav class="nav-bar">
      <div class="logo" id="app-title">SYNQ</div>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/onboarding">Features</a>
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link active" href="/athletes">Athletes</a>
      </div>
    </nav>

  <div id="page-content">
    <!-- Athlete Profile Page (initial content) -->
    <main id="athlete-profile" class="page active">

      <!-- Profile Header -->
      <div style="padding:0 0 24px 0;">
        <a href="#" onclick="event.preventDefault(); window.location.href = sessionStorage.getItem('athleteListUrl') || '/athletes';" style="display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.45);font-size:13px;font-family:'Inter',sans-serif;text-decoration:none;margin-bottom:20px;transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.45)'">← Back to Athletes</a>
        <h1 id="profile-athlete-name" style="font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:#FFFFFF;letter-spacing:2px;text-transform:uppercase;margin:0 0 10px 0;">Loading...</h1>
        <div style="display:flex;align-items:center;gap:28px;flex-wrap:wrap;">
          <p id="profile-athlete-status" style="font-family:'Inter',sans-serif;font-size:14px;color:rgba(255,255,255,0.55);margin:0;">—</p>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-family:'Inter',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;">Energy</span>
            <span id="energy-label" style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#00FF88;">—</span>
          </div>
        </div>
      </div>

      <!-- JARVIS Orbital Interface -->
      <div class="jarvis-container">
        <div class="orbital-system">

          <!-- Particle layer -->
          <div class="particle-container" id="particle-container"></div>

          <!-- ─── Central Reactor ─── -->
          <div class="central-reactor" id="central-reactor" style="color:#00FF88;">
            <div class="reactor-aura" id="reactor-aura"></div>
            <div class="warning-orbit" id="warning-orbit"></div>
            <svg class="reactor-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <!-- 3D specular gradient: bright highlight top-left, fades to transparent at edge -->
                <radialGradient id="coreGradient" cx="38%" cy="32%" r="65%">
                  <stop offset="0%"   stop-color="white"        stop-opacity="0.95"/>
                  <stop offset="22%"  stop-color="currentColor" stop-opacity="0.9"/>
                  <stop offset="60%"  stop-color="currentColor" stop-opacity="0.5"/>
                  <stop offset="100%" stop-color="currentColor" stop-opacity="0.05"/>
                </radialGradient>
              </defs>

              <!-- ── Outer energy track ── -->
              <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
              <!-- ── Energy ring — spins via CSS, fill set by JS ── -->
              <circle id="energy-ring" cx="120" cy="120" r="110" fill="none" stroke="currentColor" stroke-width="7" stroke-dasharray="0 691" stroke-linecap="round"/>

              <!-- ── Atmospheric glow halos ── -->
              <circle cx="120" cy="120" r="103" fill="currentColor" opacity="0.05"/>
              <circle cx="120" cy="120" r="91" fill="currentColor" opacity="0.08"/>
              <!-- ── Outer structural ring ── -->
              <circle cx="120" cy="120" r="100" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.15"/>

              <!-- ── Core glowing sphere ── -->
              <circle cx="120" cy="120" r="95" fill="url(#coreGradient)" stroke="currentColor" stroke-width="1.5" opacity="0.95"/>
              <!-- ── Inner detail ring ── -->
              <circle cx="120" cy="120" r="72" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.28"/>

<!-- ── Energy percentage ── -->
              <text id="sphere-pct" x="120" y="118" text-anchor="middle" fill="white"
                    font-family="Orbitron,sans-serif" font-size="46" font-weight="900">—</text>
              <text x="120" y="138" text-anchor="middle" fill="rgba(255,255,255,0.55)"
                    font-family="Inter,sans-serif" font-size="9" letter-spacing="2.5" font-weight="600">ENERGY</text>
              <!-- ── Fatigue status ── -->
              <text id="sphere-status" x="120" y="155" text-anchor="middle" fill="currentColor"
                    font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">—</text>
            </svg>
          </div>

          <!-- ─── Heart Rate Orbital (Top) — Electric Purple ─── -->
          <div class="orbital-data-ring orbital-top" id="orbital-hr" style="color:#A855F7;">
            <svg class="orbital-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
              <circle cx="80" cy="80" r="70" fill="rgba(168,85,247,0.05)" stroke="rgba(168,85,247,0.15)" stroke-width="8"/>
              <!-- Data ring — circumference ≈ 440 (r=70) -->
              <circle id="hr-ring" cx="80" cy="80" r="70" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 80 80)"/>
              <text x="80" y="70"  text-anchor="middle" fill="currentColor"          font-family="Orbitron,sans-serif" font-size="24" font-weight="900" id="profile-heart-rate">—</text>
              <text x="80" y="88"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif"    font-size="10">BPM</text>
              <text x="80" y="104" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif"    font-size="8"  letter-spacing="1">HEART RATE</text>
            </svg>
            <!-- Sparkline popup (double-click orbital to open) -->
            <div class="sparkline-container" id="sparkline-heart-rate" style="color:#A855F7;top:-10px;left:170px;">
              <div class="sparkline-title">Heart Rate Trend</div>
              <canvas class="sparkline-canvas" id="sparkline-hr-canvas"></canvas>
            </div>
            <!-- Comparison panel (single-click orbital to open) -->
            <div class="comparison-panel" id="comparison-panel-heart-rate" style="color:#A855F7;top:-10px;left:170px;">
              <div class="comparison-header">
                <span class="comparison-title">Heart Rate</span>
                <button class="comparison-close" onclick="closeComparison('heart-rate')">×</button>
              </div>
              <div class="comparison-stat">
                <div class="comparison-values">
                  <div class="comparison-value">
                    <span class="comparison-value-label">Baseline</span>
                    <span class="comparison-value-number" id="baseline-heart-rate">—</span>
                  </div>
                  <div class="comparison-value" style="text-align:right;">
                    <span class="comparison-value-label">Current</span>
                    <span class="comparison-value-number" id="current-heart-rate">—</span>
                  </div>
                </div>
              </div>
              <div class="comparison-change" id="heart-rate-change"></div>
            </div>
          </div>

          <!-- ─── Temperature Orbital (Right) — Neon Pink ─── -->
          <div class="orbital-data-ring orbital-right" id="orbital-temp" style="color:#EC4899;">
            <svg class="orbital-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
              <circle cx="80" cy="80" r="70" fill="rgba(236,72,153,0.05)" stroke="rgba(236,72,153,0.15)" stroke-width="8"/>
              <circle id="temp-ring" cx="80" cy="80" r="70" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 80 80)"/>
              <text x="80" y="70"  text-anchor="middle" fill="currentColor"          font-family="Orbitron,sans-serif" font-size="20" font-weight="900" id="profile-temperature">—</text>
              <text x="80" y="88"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif"    font-size="10">°C</text>
              <text x="80" y="104" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif"    font-size="8"  letter-spacing="1">TEMPERATURE</text>
            </svg>
            <div class="sparkline-container" id="sparkline-temperature" style="color:#EC4899;top:170px;left:-60px;">
              <div class="sparkline-title">Temperature Trend</div>
              <canvas class="sparkline-canvas" id="sparkline-temp-canvas"></canvas>
            </div>
            <div class="comparison-panel" id="comparison-panel-temperature" style="color:#EC4899;top:170px;left:-60px;">
              <div class="comparison-header">
                <span class="comparison-title">Temperature</span>
                <button class="comparison-close" onclick="closeComparison('temperature')">×</button>
              </div>
              <div class="comparison-stat">
                <div class="comparison-values">
                  <div class="comparison-value">
                    <span class="comparison-value-label">Baseline</span>
                    <span class="comparison-value-number" id="baseline-temperature">—</span>
                  </div>
                  <div class="comparison-value" style="text-align:right;">
                    <span class="comparison-value-label">Current</span>
                    <span class="comparison-value-number" id="current-temperature">—</span>
                  </div>
                </div>
              </div>
              <div class="comparison-change" id="temperature-change"></div>
            </div>
          </div>

          <!-- ─── Blood Oxygen Orbital (Left) — Electric Blue ─── -->
          <div class="orbital-data-ring orbital-left" id="orbital-o2" style="color:#3B82F6;">
            <svg class="orbital-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
              <circle cx="80" cy="80" r="70" fill="rgba(59,130,246,0.05)" stroke="rgba(59,130,246,0.15)" stroke-width="8"/>
              <circle id="o2-ring" cx="80" cy="80" r="70" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 80 80)"/>
              <text x="80" y="70"  text-anchor="middle" fill="currentColor"          font-family="Orbitron,sans-serif" font-size="24" font-weight="900" id="profile-blood-oxygen">—</text>
              <text x="80" y="88"  text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif"    font-size="10">%</text>
              <text x="80" y="104" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif"    font-size="8"  letter-spacing="1">BLOOD O₂</text>
            </svg>
            <div class="sparkline-container" id="sparkline-blood-oxygen" style="color:#3B82F6;top:170px;left:-60px;">
              <div class="sparkline-title">SpO₂ Trend</div>
              <canvas class="sparkline-canvas" id="sparkline-o2-canvas"></canvas>
            </div>
            <div class="comparison-panel" id="comparison-panel-blood-oxygen" style="color:#3B82F6;top:170px;left:-60px;">
              <div class="comparison-header">
                <span class="comparison-title">Blood O₂</span>
                <button class="comparison-close" onclick="closeComparison('blood-oxygen')">×</button>
              </div>
              <div class="comparison-stat">
                <div class="comparison-values">
                  <div class="comparison-value">
                    <span class="comparison-value-label">Baseline</span>
                    <span class="comparison-value-number" id="baseline-blood-oxygen">—</span>
                  </div>
                  <div class="comparison-value" style="text-align:right;">
                    <span class="comparison-value-label">Current</span>
                    <span class="comparison-value-number" id="current-blood-oxygen">—</span>
                  </div>
                </div>
              </div>
              <div class="comparison-change" id="blood-oxygen-change"></div>
            </div>
          </div>

        </div><!-- /.orbital-system -->
      </div><!-- /.jarvis-container -->

    </main>
  </div>

  </div>
  <script>

  document.addEventListener('DOMContentLoaded', async function() {
    const athleteIdParam = "{{ athlete_id or '' }}";
    if (!athleteIdParam) return;
    try {
      const response = await fetch('/api/athletes');
      window.athletesData = await response.json();
      // Match by unique ID — handles duplicate names correctly
      const athlete = window.athletesData.find(a => String(a.id) === athleteIdParam);
      if (athlete) {
        openAthleteProfile(athlete.id);
        updateWarningIndicators(athlete.fatigue_status);
      }
      setupGestureControls();
    } catch (error) {
      console.error('Failed to load athlete:', error);
    }
  });

    // baseline sphere tapping
    let baselineVitals = {
      heart_rate: 120,
      temperature: 36.8,
      blood_oxygen: 98
    };
    let vitalHistory = {
      heart_rate: [],
      temperature: [],
      blood_oxygen: []
    };
    
    // Gesture control variables
    let doubleTapTimer = null;
    let longPressTimer = null;
    let longPressTarget = null;

    // Particle System Functions
    function createParticle(startX, startY, targetX, targetY, color, isLarge = false) {
      const container = document.getElementById('particle-container');
      if (!container) return;

      const particle = document.createElement('div');
      particle.className = isLarge ? 'particle large' : 'particle';
      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      particle.style.color = color;
      
      const deltaX = targetX - startX;
      const deltaY = targetY - startY;
      
      particle.style.setProperty('--tx', deltaX + 'px');
      particle.style.setProperty('--ty', deltaY + 'px');
      
      container.appendChild(particle);
      
      particle.style.animation = 'particle-flow-in 2s cubic-bezier(0.4, 0, 0.2, 1) forwards';
      
      setTimeout(() => {
        particle.remove();
      }, 2000);
    }

    function startParticleFlow(status) {
      const container = document.getElementById('particle-container');
      if (!container) return;

      const orbitalPositions = [
        { x: 340, y: 100 },  // top  (orbital-system 680px, center 340, top at 340-240=100)
        { x: 580, y: 340 },  // right (340+240=580)
        { x: 100, y: 340 }   // left  (340-240=100)
      ];

      const centerX = 340;
      const centerY = 340;

      let color, interval, largeParticleChance;
      if (status === 'Not Fatigued') {
        color = '#00FF88';
        interval = 200;  // More frequent for green status
        largeParticleChance = 0.6;  // 60% chance of large particles
      } else if (status === 'Moderate') {
        color = '#FFB800';
        interval = 500;
        largeParticleChance = 0.3;
      } else {
        color = '#FF3366';
        interval = 300;
        largeParticleChance = 0.2;
      }

      const particleInterval = setInterval(() => {
        if (document.getElementById('athlete-profile').classList.contains('active')) {
          const randomOrbital = orbitalPositions[Math.floor(Math.random() * orbitalPositions.length)];
          const isLarge = Math.random() < largeParticleChance;
          createParticle(randomOrbital.x, randomOrbital.y, centerX, centerY, color, isLarge);
          
          // For green status, create double particles sometimes
          if (status === 'Normal' && Math.random() < 0.4) {
            const randomOrbital2 = orbitalPositions[Math.floor(Math.random() * orbitalPositions.length)];
            setTimeout(() => {
              createParticle(randomOrbital2.x, randomOrbital2.y, centerX, centerY, color, isLarge);
            }, 100);
          }
        } else {
          clearInterval(particleInterval);
        }
      }, interval);
    }

    // Warning indicators
    function updateWarningIndicators(status) {
      const warningOrbit = document.getElementById('warning-orbit');
      if (!warningOrbit) return;
      warningOrbit.innerHTML = '';
    }

    // Reactor aura intensity
    function updateReactorAura(status) {
      const aura = document.getElementById('reactor-aura');
      const reactor = document.getElementById('central-reactor');
      if (!aura || !reactor) return;

      aura.classList.remove('intense');
      reactor.classList.remove('reactor-fatigued');

      if (status === 'Fatigued') {
        aura.classList.add('intense');
        reactor.classList.add('reactor-fatigued');
      }
    }

    // Heat trail animation
    function createHeatTrail(x, y, color) {
      const trail = document.createElement('div');
      trail.className = 'heat-trail';
      trail.style.left = x + 'px';
      trail.style.top = y + 'px';
      trail.style.color = color;
      trail.style.animation = 'trail-fade 0.8s ease-out forwards';
      
      const container = document.querySelector('.orbital-system');
      if (container) {
        container.appendChild(trail);
        setTimeout(() => trail.remove(), 800);
      }
    }

    // Energy burst celebration — fires on page load when energy = 100%
    function celebrateFullEnergy() {
      const reactor = document.getElementById('central-reactor');
      if (!reactor) return;

      // Read the colour already applied to the reactor so rings match
      const color = reactor.style.color || '#00FF88';

      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const ring = document.createElement('div');
          ring.className = 'energy-burst-ring animate';
          ring.style.color = color;
          reactor.appendChild(ring);
          setTimeout(() => ring.remove(), 1000);
        }, i * 180);
      }
    }

    // Sparkline chart functions
    function generateVitalHistory(currentValue, type) {
      const history = [];
      const points = 20;
      
      let baseValue, variance;
      if (type === 'heart_rate') {
        baseValue = currentValue;
        variance = 10;
      } else if (type === 'temperature') {
        baseValue = currentValue;
        variance = 0.3;
      } else {
        baseValue = currentValue;
        variance = 2;
      }

      for (let i = 0; i < points; i++) {
        const randomOffset = (Math.random() - 0.5) * variance;
        history.push(baseValue + randomOffset);
      }
      
      history[points - 1] = currentValue;
      return history;
    }

    function drawSparkline(canvasId, data, color, minVal, maxVal) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const width = canvas.width = canvas.offsetWidth * 2;
      const height = canvas.height = canvas.offsetHeight * 2;

      ctx.clearRect(0, 0, width, height);

      if (data.length < 2) return;

      const padding = 10;
      const chartWidth = width - padding * 2;
      const chartHeight = height - padding * 2;

      const xStep = chartWidth / (data.length - 1);
      const range = maxVal - minVal;

      // Draw gradient background
      const gradient = ctx.createLinearGradient(0, padding, 0, height - padding);
      gradient.addColorStop(0, color + '40');
      gradient.addColorStop(1, color + '00');
      
      ctx.beginPath();
      ctx.moveTo(padding, height - padding);
      
      data.forEach((value, index) => {
        const x = padding + index * xStep;
        const y = height - padding - ((value - minVal) / range) * chartHeight;
        
        if (index === 0) {
          ctx.lineTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      
      ctx.lineTo(width - padding, height - padding);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw line
      ctx.beginPath();
      data.forEach((value, index) => {
        const x = padding + index * xStep;
        const y = height - padding - ((value - minVal) / range) * chartHeight;
        
        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Draw current value dot
      const lastX = padding + (data.length - 1) * xStep;
      const lastY = height - padding - ((data[data.length - 1] - minVal) / range) * chartHeight;
      
      ctx.beginPath();
      ctx.arc(lastX, lastY, 6, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    let activeSparkline = null;
    let sparklineTimer = null;

    function showSparkline(type) {
      // Close any active sparkline
      if (activeSparkline) {
        document.getElementById(activeSparkline).classList.remove('active');
      }

      clearTimeout(sparklineTimer);

      const sparklineId = `sparkline-${type}`;
      const sparkline = document.getElementById(sparklineId);
      if (!sparkline) return;

      activeSparkline = sparklineId;
      sparkline.classList.add('active');

      // Generate and draw sparkline
      let canvasId, history, minVal, maxVal, color;
      
      if (type === 'heart-rate') {
        canvasId = 'sparkline-hr-canvas';
        history = vitalHistory.heart_rate.length ? vitalHistory.heart_rate : generateVitalHistory(window.currentAthlete.heart_rate, 'heart_rate');
        minVal = 60;
        maxVal = 180;
        color = '#A855F7';
      } else if (type === 'temperature') {
        canvasId = 'sparkline-temp-canvas';
        history = vitalHistory.temperature.length ? vitalHistory.temperature : generateVitalHistory(window.currentAthlete.body_temperature, 'temperature');
        minVal = 35;
        maxVal = 39;
        color = '#EC4899';
      } else if (type === 'blood-oxygen') {
        canvasId = 'sparkline-o2-canvas';
        history = vitalHistory.blood_oxygen.length ? vitalHistory.blood_oxygen : generateVitalHistory(window.currentAthlete.blood_oxygen, 'blood_oxygen');
        minVal = 90;
        maxVal = 100;
        color = '#3B82F6';
      }

      if (canvasId && history) {
        drawSparkline(canvasId, history, color, minVal, maxVal);
      }

      // Auto-hide after 5 seconds
      sparklineTimer = setTimeout(() => {
        sparkline.classList.remove('active');
        activeSparkline = null;
      }, 5000);
    }

    function hideSparkline(type) {
      const sparklineId = `sparkline-${type}`;
      const sparkline = document.getElementById(sparklineId);
      if (sparkline) {
        sparkline.classList.remove('active');
      }
      if (activeSparkline === sparklineId) {
        activeSparkline = null;
      }
      clearTimeout(sparklineTimer);
    }
    // Gesture Controls
    function setupGestureControls() {
      const reactor = document.getElementById('central-reactor');
      if (!reactor) return;

      reactor.addEventListener('click', function(event) {
        event.stopPropagation();
        this.style.animation = 'none';
        void this.offsetWidth;
        this.style.animation = 'vibranium-vibrate 0.75s cubic-bezier(0.36, 0.07, 0.19, 0.97)';
        // Resume float after vibration ends
        setTimeout(() => {
          this.style.animation = 'float-reactor 4.5s ease-in-out infinite';
        }, 750);
      });

      // Single/Double click setup for orbital rings
      const orbitals = [
        { id: 'orbital-hr',   type: 'heart-rate' },
        { id: 'orbital-temp', type: 'temperature' },
        { id: 'orbital-o2',   type: 'blood-oxygen' }
      ];

      orbitals.forEach(orbital => {
        const element = document.getElementById(orbital.id);
        if (!element) return;

        let clickCount = 0;
        let clickTimer = null;

        element.addEventListener('click', function(e) {
          // Prevent event from bubbling to reactor
          e.stopPropagation();
          
          clickCount++;

          if (clickCount === 1) {
            // Wait to see if there's a second click
            clickTimer = setTimeout(() => {
              // Single click - show baseline comparison
              const panel = document.getElementById(`comparison-panel-${orbital.type}`);
              if (panel) {
                if (panel.classList.contains('active')) {
                  panel.classList.remove('active');
                } else {
                  // Close other panels first
                  document.querySelectorAll('.comparison-panel').forEach(p => {
                    p.classList.remove('active');
                  });
                  panel.classList.add('active');
                  updateComparisonPanel(orbital.type);
                }
              }
              clickCount = 0;
            }, 300);
          } else if (clickCount === 2) {
            // Double click - show sparkline
            clearTimeout(clickTimer);
            clickCount = 0;
            
            // Close comparison panel if open
            const panel = document.getElementById(`comparison-panel-${orbital.type}`);
            if (panel) {
              panel.classList.remove('active');
            }
            
            // Show sparkline
            showSparkline(orbital.type);
          }
        });
      });
    }



    function closeComparison(type) {
      const panel = document.getElementById(`comparison-panel-${type}`);
      if (panel) {
        panel.classList.remove('active');
      }
    }

    function updateComparisonPanel(type) {
      if (!window.currentAthlete) return;

      let current, baseline, unit, changeElement;

      if (type === 'heart-rate') {
        current = window.currentAthlete.heart_rate;
        baseline = baselineVitals.heart_rate;
        unit = 'bpm';
        changeElement = document.getElementById('heart-rate-change');
        document.getElementById('baseline-heart-rate').textContent = baseline;
        document.getElementById('current-heart-rate').textContent = current;
      } else if (type === 'temperature') {
        current = window.currentAthlete.body_temperature;
        baseline = baselineVitals.temperature;
        unit = '°C';
        changeElement = document.getElementById('temperature-change');
        document.getElementById('baseline-temperature').textContent = baseline.toFixed(1);
        document.getElementById('current-temperature').textContent = current.toFixed(1);
      } else if (type === 'blood-oxygen') {
        current = window.currentAthlete.blood_oxygen;
        baseline = baselineVitals.blood_oxygen;
        unit = '%';
        changeElement = document.getElementById('blood-oxygen-change');
        document.getElementById('baseline-blood-oxygen').textContent = baseline;
        document.getElementById('current-blood-oxygen').textContent = current;
      }

      if (changeElement) {
        const diff = current - baseline;
        const diffAbs = Math.abs(diff);
        
        changeElement.classList.remove('positive', 'negative', 'neutral');
        
        if (type === 'blood-oxygen') {
          // For blood oxygen, higher is better
          if (diff > 0) {
            changeElement.classList.add('positive');
            changeElement.innerHTML = `<span class="comparison-arrow">↑</span><span>+${diffAbs}${unit} Better</span>`;
          } else if (diff < 0) {
            changeElement.classList.add('negative');
            changeElement.innerHTML = `<span class="comparison-arrow">↓</span><span>-${diffAbs}${unit} Lower</span>`;
          } else {
            changeElement.classList.add('neutral');
            changeElement.innerHTML = `<span class="comparison-arrow">   </span><span>No change</span>`;
          }
        } else {
          // For heart rate and temperature, deviation from baseline is concerning
          if (diff > 0) {
            changeElement.classList.add('negative');
            changeElement.innerHTML = `<span class="comparison-arrow">↑</span><span>+${type === 'temperature' ? diffAbs.toFixed(1) : diffAbs}${unit} Elevated</span>`;
          } else if (diff < 0) {
            changeElement.classList.add('positive');
            changeElement.innerHTML = `<span class="comparison-arrow">↓</span><span>-${type === 'temperature' ? diffAbs.toFixed(1) : diffAbs}${unit} Improved</span>`;
          } else {
            changeElement.classList.add('neutral');
            changeElement.innerHTML = `<span class="comparison-arrow">→</span><span>No change</span>`;
          }
        }
      }
    }
    




  </script>
